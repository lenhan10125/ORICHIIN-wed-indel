<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORICHIIN - CHAT SERVER</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAHEntigIN79IuzszmWDL6nnDxO5yp748I",
            authDomain: "admin-bd0ff.firebaseapp.com",
            projectId: "admin-bd0ff",
            storageBucket: "admin-bd0ff.appspot.com",
            messagingSenderId: "721293740677",
            appId: "1:721293740677:web:8c6ae2228e9af16aa437ec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let lastReloadKey = null;
        let isSiteReady = false;
        let pendingPopupData = null;

        // --- CẬP NHẬT THÔNG BÁO VÀ RELOAD TỪ ADMIN (TRANG CHỦ) ---
        onSnapshot(doc(db, "settings", "notice"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (lastReloadKey !== null && data.reloadTrigger !== lastReloadKey) {
                    location.reload(); 
                }
                lastReloadKey = data.reloadTrigger;
            }
        });

        // --- PHẦN LIÊN KẾT MỚI: LẮNG NGHE THÔNG BÁO RIÊNG CHO CHAT SERVER ---
        onSnapshot(doc(db, "settings", "chat_notice"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const noticeElement = document.getElementById('live-chat-notice');
                if (noticeElement && data.content) {
                    noticeElement.innerHTML = data.content.replace(/\n/g, '<br>');
                }
            }
        });

        // Hệ thống Popup động (Đã nâng cấp logic chờ loading)
        onSnapshot(doc(db, "settings", "popup"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (isSiteReady) {
                    showPopup(data);
                } else {
                    pendingPopupData = data;
                }
            }
        });

        window.addEventListener("load", () => {
            setTimeout(() => {
                isSiteReady = true;
                if (pendingPopupData) showPopup(pendingPopupData);
            }, 1000);
        });

        function showPopup(data) {
            const overlay = document.getElementById('popup-overlay');
            const mainPopup = document.getElementById('main-popup');
            const textElement = document.getElementById('popup-text');

            if (data.active === true) {
                if (data.bgColor && (data.bgColor.startsWith('http'))) {
                    mainPopup.style.background = `url('${data.bgColor}') no-repeat center center`;
                    mainPopup.style.backgroundSize = "cover";
                } else {
                    mainPopup.style.background = data.bgColor || "rgba(0,0,0,0.9)";
                }

                textElement.style.color = data.textColor || "#ffffff";
                textElement.style.fontSize = data.fontSize || "18px";
                textElement.style.fontFamily = data.fontFamily || "sans-serif";
                textElement.innerText = data.content || "";
                overlay.style.display = 'flex';
                overlay.classList.remove('closing');
            } else {
                overlay.style.display = 'none';
            }
        }
    </script>

    <style>
        /* FONTS */
        @font-face {
            font-family: 'Lato';
            src: url(https://img1.wsimg.com/gfonts/s/lato/v25/S6uyw4BMUTPHjx4wXg.woff2) format('woff2');
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Lato', sans-serif;
            background: #0f0f0f;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        :root {
            --neon-blue: #00f3ff;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url(https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg) no-repeat center center fixed;
            background-size: cover;
            opacity: 0.3;
            z-index: -1;
        }

        @keyframes neon-burn {
            0%, 100% {
                text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
                box-shadow: inset 0 0 15px var(--neon-blue), 0 0 10px rgba(0, 243, 255, 0.2);
            }
            50% {
                text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue), 0 0 60px var(--neon-blue);
                box-shadow: inset 0 0 45px var(--neon-blue), 0 0 25px rgba(0, 243, 255, 0.5);
            }
        }

        .main-wrapper {
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; min-height: 100vh;
            box-sizing: border-box;
        }

        .notice-container {
            width: 100%; max-width: 800px;
            background: rgba(0, 0, 0, 0.8);
            border-left: 5px solid #99CCFF;
            padding: 20px; border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .notice-container:hover { animation: neon-burn 1.5s infinite alternate ease-in-out; }
        .notice-container h2 { color: #99CCFF; margin: 0 0 10px 0; font-size: 1.5rem; }
        .notice-container p { margin: 0; line-height: 1.6; color: #ddd; }

        .chat-frame {
            width: 100%; max-width: 800px;
            height: 600px;
            background: rgba(26, 26, 26, 0.9);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .back-btn {
            align-self: flex-start; margin-bottom: 20px;
            color: #99CCFF; text-decoration: none; font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            transition: 0.3s;
        }
        .back-btn:hover { color: white; transform: translateX(-5px); }

        #popup-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; 
            align-items: center; backdrop-filter: blur(5px);
            transition: opacity 0.3s ease;
        }
        #main-popup {
            width: 90%; max-width: 500px; min-height: 300px; border-radius: 30px; 
            position: relative; padding: 40px; box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,1); 
            border: 1px solid #99CCFF;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }
        #popup-overlay.closing { opacity: 0; pointer-events: none; }
        #popup-overlay.closing #main-popup {
            transform: translate(-45vw, -45vh) scale(0);
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="popup-overlay">
        <div id="main-popup">
            <button onclick="closePopup()" style="position: absolute; top: 15px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 24px; cursor: pointer; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;">&times;</button>
            <div id="popup-text" style="word-wrap: break-word; width: 100%; white-space: pre-wrap; line-height: 1.5;"></div>
        </div>
    </div>

    <div class="main-wrapper">
        <a href="/" class="back-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path></svg>
            QUAY LẠI TRANG CHỦ
        </a>

        <div class="notice-container">
            <h2>NOTICE / THÔNG BÁO</h2>
            <p id="live-chat-notice">Đang tải thông báo từ máy chủ...</p>
        </div>

        <div class="chat-frame">
            <iframe src="https://www5.cbox.ws/box/?boxid=961747&boxtag=8h6smg" 
                    width="100%" 
                    height="100%" 
                    allowtransparency="yes" 
                    allow="autoplay" 
                    frameborder="0" 
                    marginheight="0" 
                    marginwidth="0" 
                    scrolling="auto">
            </iframe>
        </div>
    </div>

    <script>
        function closePopup() {
            const overlay = document.getElementById('popup-overlay');
            overlay.classList.add('closing');
            setTimeout(() => {
                overlay.style.display = 'none';
                overlay.classList.remove('closing');
            }, 400);
        }
    </script>

</body>

</html>
