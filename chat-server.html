<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORICHIIN - CHAT SERVER</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAHEntigIN79IuzszmWDL6nnDxO5yp748I",
            authDomain: "admin-bd0ff.firebaseapp.com",
            projectId: "admin-bd0ff",
            storageBucket: "admin-bd0ff.appspot.com",
            messagingSenderId: "721293740677",
            appId: "1:721293740677:web:8c6ae2228e9af16aa437ec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let lastReloadKey = null;

        // Tự động tải lại trang khi có lệnh từ Admin
        onSnapshot(doc(db, "settings", "notice"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (lastReloadKey !== null && data.reloadTrigger !== lastReloadKey) {
                    location.reload(); 
                }
                lastReloadKey = data.reloadTrigger;
            }
        });

        // Hệ thống Popup động
        onSnapshot(doc(db, "settings", "popup"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const overlay = document.getElementById('popup-overlay');
                const mainPopup = document.getElementById('main-popup');
                const textElement = document.getElementById('popup-text');

                if (data.active === true) {
                    if (data.bgColor && (data.bgColor.startsWith('http'))) {
                        mainPopup.style.background = `url('${data.bgColor}') no-repeat center center`;
                        mainPopup.style.backgroundSize = "cover";
                    } else {
                        mainPopup.style.background = data.bgColor || "rgba(0,0,0,0.9)";
                    }

                    textElement.style.color = data.textColor || "#ffffff";
                    textElement.style.fontSize = data.fontSize || "18px";
                    textElement.style.fontFamily = data.fontFamily || "sans-serif";
                    textElement.innerText = data.content || "";
                    overlay.style.display = 'flex';
                } else {
                    overlay.style.display = 'none';
                }
            }
        });
    </script>

    <style>
        /* FONTS */
        @font-face {
            font-family: 'Lato';
            src: url(https://img1.wsimg.com/gfonts/s/lato/v25/S6uyw4BMUTPHjx4wXg.woff2) format('woff2');
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Lato', sans-serif;
            background: #0f0f0f;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        /* --- BACKGROUND NHƯ TRANG CHỦ --- */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url(https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg) no-repeat center center fixed;
            background-size: cover;
            opacity: 0.3;
            z-index: -1;
        }

        /* --- CONTAINER CHÍNH --- */
        .main-wrapper {
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- PHẦN NOTICE (THÔNG BÁO) --- */
        .notice-container {
            width: 100%; max-width: 800px;
            background: rgba(0, 0, 0, 0.8);
            border-left: 5px solid #99CCFF;
            padding: 20px; border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .notice-container h2 { color: #99CCFF; margin: 0 0 10px 0; font-size: 1.5rem; }
        .notice-container p { margin: 0; line-height: 1.6; color: #ddd; }

        /* --- KHUNG CHATBOX --- */
        .chat-frame {
            width: 100%; max-width: 800px;
            height: 600px;
            background: rgba(26, 26, 26, 0.9);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .back-btn {
            align-self: flex-start; margin-bottom: 20px;
            color: #99CCFF; text-decoration: none; font-weight: bold;
            display: flex; align-items: center; gap: 8px;
        }
        .back-btn:hover { color: white; }

        /* --- STYLE CHO POPUP --- */
        #popup-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; 
            align-items: center; backdrop-filter: blur(5px);
        }
        #main-popup {
            width: 90%; max-width: 500px; min-height: 300px; border-radius: 30px; 
            position: relative; padding: 40px; box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,1); 
            border: 1px solid #99CCFF;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="popup-overlay">
        <div id="main-popup">
            <button onclick="document.getElementById('popup-overlay').style.display='none'" style="position: absolute; top: 15px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 24px; cursor: pointer; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;">&times;</button>
            <div id="popup-text" style="word-wrap: break-word; width: 100%; white-space: pre-wrap; line-height: 1.5;"></div>
        </div>
    </div>

    <div class="main-wrapper">
        <a href="/" class="back-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path></svg>
            QUAY LẠI TRANG CHỦ
        </a>

        <div class="notice-container">
            <h2>NOTICE / THÔNG BÁO</h2>
            <p>Chào mừng Orichiin-san đã đến với Server Chat! <br> 
               Vui lòng giữ lịch sự, không spam hoặc gửi liên kết độc hại. Chúc bạn có trải nghiệm tuyệt vời tại ORICHIIN STUDIO!</p>
        </div>

        <div class="chat-frame">
            <iframe src="https://www5.cbox.ws/box/?boxid=961747&boxtag=8h6smg" 
                    width="100%" 
                    height="100%" 
                    allowtransparency="yes" 
                    allow="autoplay" 
                    frameborder="0" 
                    marginheight="0" 
                    marginwidth="0" 
                    scrolling="auto">
            </iframe>
        </div>
    </div>

</body>
</html>
