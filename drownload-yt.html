<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>video blog</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAHEntigIN79IuzszmWDL6nnDxO5yp748I",
            authDomain: "admin-bd0ff.firebaseapp.com",
            projectId: "admin-bd0ff",
            storageBucket: "admin-bd0ff.appspot.com",
            messagingSenderId: "721293740677",
            appId: "1:721293740677:web:8c6ae2228e9af16aa437ec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let lastReloadKey = null;

        // Tự động tải lại trang khi có lệnh từ Admin
        onSnapshot(doc(db, "settings", "notice"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (lastReloadKey !== null && data.reloadTrigger !== lastReloadKey) {
                    location.reload(); 
                }
                lastReloadKey = data.reloadTrigger;
            }
        });

        // Hệ thống Popup động
        onSnapshot(doc(db, "settings", "popup"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const overlay = document.getElementById('popup-overlay');
                const mainPopup = document.getElementById('main-popup');
                const textElement = document.getElementById('popup-text');

                if (data.active === true) {
                    // Cấu hình nền (Ảnh hoặc màu)
                    if (data.bgColor && (data.bgColor.startsWith('http'))) {
                        mainPopup.style.background = `url('${data.bgColor}') no-repeat center center`;
                        mainPopup.style.backgroundSize = "cover";
                    } else {
                        mainPopup.style.background = data.bgColor || "rgba(0,0,0,0.9)";
                    }

                    textElement.style.color = data.textColor || "#ffffff";
                    textElement.style.fontSize = data.fontSize || "18px";
                    textElement.style.fontFamily = data.fontFamily || "sans-serif";
                    textElement.innerText = data.content || "";
                    overlay.style.display = 'flex';
                } else {
                    overlay.style.display = 'none';
                }
            }
        });
    </script>

    <style>
        :root {
            --gura-blue: #99CCFF;
            --gura-dark: #0a0e14;
            --gura-accent: #3399FF;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--gura-dark);
            color: white; font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url(https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg) no-repeat center center fixed;
            background-size: cover; filter: blur(5px) brightness(0.4);
            z-index: -1;
        }

        .pure-nav {
            height: 60px; background: rgba(0, 0, 0, 0.7);
            display: flex; align-items: center; padding: 0 20px;
            border-bottom: 2px solid var(--gura-blue);
            position: sticky; top: 0; z-index: 100;
        }

        .search-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            gap: 10px;
        }

        .pure-input {
            width: 60%; background: rgba(255,255,255,0.1);
            border: 1px solid var(--gura-blue); border-radius: 20px;
            padding: 10px 20px; color: white; outline: none;
        }

        .main-stage {
            max-width: 1100px; margin: 20px auto;
            background: rgba(0,0,0,0.8); border-radius: 15px;
            overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .video-box {
            position: relative; width: 100%; padding-top: 56.25%;
            background: #000;
        }

        .video-box iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .action-bar {
            padding: 15px 20px; display: flex; align-items: center;
            justify-content: space-between; background: rgba(255,255,255,0.05);
            gap: 10px;
        }

        .video-title { font-weight: bold; color: var(--gura-blue); font-size: 1.1rem; }

        .button-group { display: flex; gap: 10px; }

        .btn-download, .btn-copy {
            color: white; border: none; padding: 10px 20px;
            border-radius: 25px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            transition: 0.3s; font-size: 0.9rem;
        }

        .btn-download { background: linear-gradient(45deg, #00c6ff, #0072ff); }
        .btn-copy { background: rgba(255, 255, 255, 0.2); border: 1px solid var(--gura-blue); }

        .btn-download:hover, .btn-copy:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(153, 204, 255, 0.3); }

        .suggestions {
            max-width: 1100px; margin: 20px auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px; padding: 0 10px;
        }

        .card {
            background: rgba(255,255,255,0.05); border-radius: 10px;
            padding: 10px; cursor: pointer; transition: 0.3s;
        }
        .card:hover { background: rgba(153, 204, 255, 0.2); }
        .card img { width: 100%; border-radius: 5px; }

        /* CSS CHO POPUP OVERLAY */
        #popup-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; 
            align-items: center; backdrop-filter: blur(5px);
        }
        #main-popup {
            width: 90%; max-width: 500px; min-height: 300px; border-radius: 30px; 
            position: relative; padding: 40px; box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,1); 
            border: 1px solid var(--gura-blue);
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="popup-overlay">
        <div id="main-popup">
            <button onclick="document.getElementById('popup-overlay').style.display='none'" style="position: absolute; top: 15px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 24px; cursor: pointer; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;">&times;</button>
            <div id="popup-text" style="word-wrap: break-word; width: 100%; white-space: pre-wrap; line-height: 1.5;"></div>
        </div>
    </div>

    <nav class="pure-nav">
        <div style="font-weight: bold; color: var(--gura-blue);">ORICHIIN PURE 🦈</div>
        <div class="search-container">
            <input type="text" id="search-input" class="pure-input" placeholder="Dán link YouTube hoặc tìm kiếm...">
            <button onclick="updatePlayer()" style="background: none; border: none; color: var(--gura-blue); cursor: pointer; font-size: 1.5rem;">🔍</button>
        </div>
    </nav>

    <div class="main-stage">
        <div class="video-box">
            <iframe id="main-player" src="https://www.youtube-nocookie.com/embed/videoseries?list=PLw-VjHDlEOgs658kAHR_LAHi0wF-6YfRL" allowfullscreen></iframe>
        </div>
        
        <div class="action-bar">
            <div>
                <div class="video-title" id="display-title">Đang phát: Danh sách thịnh hành</div>
                <div style="font-size: 0.8rem; color: #aaa; margin-top: 5px;">Hệ thống Orichiin Pure đã sẵn sàng.</div>
            </div>
            <div class="button-group">
                <button class="btn-copy" onclick="copyToClipboard()">
                    <span>📋 COPY LINK</span>
                </button>
                <button class="btn-download" onclick="startDownload()">
                    <span>📥 TẢI VỀ (PURE)</span>
                </button>
            </div>
        </div>
    </div>

    <div class="suggestions">
        <div class="card" onclick="loadByVideoId('dQw4w9WgXcQ')">
            <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg">
            <p style="font-size: 0.8rem;">Never Gonna Give You Up</p>
        </div>
        <div class="card" onclick="loadByVideoId('5X77P-uY-eA')">
            <img src="https://img.youtube.com/vi/5X77P-uY-eA/mqdefault.jpg">
            <p style="font-size: 0.8rem;">Gawr Gura Lo-fi</p>
        </div>
    </div>

    <script>
        let currentVideoUrl = "";

        function updatePlayer() {
            const input = document.getElementById('search-input').value.trim();
            const player = document.getElementById('main-player');
            const title = document.getElementById('display-title');

            if (input.includes('youtu')) {
                const id = extractID(input);
                if (id) {
                    currentVideoUrl = `https://www.youtube.com/watch?v=${id}`;
                    player.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&showinfo=0`;
                    title.innerText = "Đang phát video: " + id;
                }
            } else {
                alert("Bạn dán link YouTube vào để mình xử lý nhé!");
            }
        }

        function loadByVideoId(id) {
            const player = document.getElementById('main-player');
            currentVideoUrl = `https://www.youtube.com/watch?v=${id}`;
            player.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1`;
            document.getElementById('display-title').innerText = "Đang phát video: " + id;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function copyToClipboard() {
            if (!currentVideoUrl) {
                alert("Chưa có link để copy đâu nè!");
                return;
            }
            const cleanUrl = currentVideoUrl.split('&')[0];
            navigator.clipboard.writeText(cleanUrl).then(() => {
                alert("Đã copy link video! Dán vào trang tải là xong.");
            });
        }

        function startDownload() {
            if (!currentVideoUrl) {
                alert("Hãy chọn một video để tải nhé!");
                return;
            }
            const cleanUrl = currentVideoUrl.split('&')[0];
            navigator.clipboard.writeText(cleanUrl);

            const choice = confirm("Mình đã tự động COPY link cho bạn rồi nhé!\n\nNhấn OK: Sang trang Cobalt (Chất lượng cao)\nNhấn Cancel: Sang trang SaveFrom (Tải nhanh)");

            if (choice) {
                window.open(`https://cobalt.tools/`, '_blank');
            } else {
                const dlUrl = `https://en1.savefrom.net/11Ox/sf?url=${encodeURIComponent(cleanUrl)}`;
                window.open(dlUrl, '_blank');
            }
        }

        function extractID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?)\??v?=?)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }
    </script>
</body>
</html>
