<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORC Studio - Apps Store</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAHEntigIN79IuzszmWDL6nnDxO5yp748I",
            authDomain: "admin-bd0ff.firebaseapp.com",
            projectId: "admin-bd0ff",
            storageBucket: "admin-bd0ff.appspot.com",
            messagingSenderId: "721293740677",
            appId: "1:721293740677:web:8c6ae2228e9af16aa437ec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let lastReloadKey = null;

        // --- ĐỒNG BỘ NOTICE & RELOAD ---
        onSnapshot(doc(db, "settings", "notice"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (lastReloadKey !== null && data.reloadTrigger !== lastReloadKey) {
                    location.reload(); 
                }
                lastReloadKey = data.reloadTrigger;
            }
        });

        // --- ĐỒNG BỘ HÌNH NỀN (MỚI) ---
        onSnapshot(doc(db, "settings", "background"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const bgOverlay = document.querySelector('.bg-overlay');
                
                // Reset style cũ
                bgOverlay.style.backgroundImage = 'none';
                bgOverlay.style.backgroundColor = 'transparent';
                bgOverlay.style.filter = 'blur(5px) brightness(0.4)'; // Giữ độ mờ cho đẹp

                if(data.type === 'auto') {
                    if(data.subType === 'system') {
                        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                        bgOverlay.style.backgroundColor = isDark ? '#0a0a0a' : '#ffffff';
                    } else if(data.subType === 'light') bgOverlay.style.backgroundColor = '#ffffff';
                    else if(data.subType === 'dark') bgOverlay.style.backgroundColor = '#0a0a0a';
                    else bgOverlay.style.backgroundColor = data.color;
                } else if (data.url) {
                    bgOverlay.style.backgroundImage = `url('${data.url}')`;
                    bgOverlay.style.backgroundSize = 'cover';
                    bgOverlay.style.backgroundPosition = 'center';
                } else {
                    // Nếu không có thiết lập, quay về mặc định Gura
                    bgOverlay.style.backgroundImage = "url('https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg')";
                }
            }
        });

        // --- ĐỒNG BỘ POPUP ---
        onSnapshot(doc(db, "settings", "popup"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const overlay = document.getElementById('popup-overlay');
                const mainPopup = document.getElementById('main-popup');
                const textElement = document.getElementById('popup-text');

                if (data.active === true) {
                    if (data.bgColor && (data.bgColor.startsWith('http'))) {
                        mainPopup.style.background = `url('${data.bgColor}') no-repeat center center`;
                        mainPopup.style.backgroundSize = "cover";
                    } else {
                        mainPopup.style.background = data.bgColor || "rgba(0,0,0,0.9)";
                    }

                    textElement.style.color = data.textColor || "#ffffff";
                    textElement.style.fontSize = data.fontSize || "18px";
                    textElement.style.fontFamily = data.fontFamily || "sans-serif";
                    textElement.innerText = data.content || "";
                    overlay.style.display = 'flex';
                } else {
                    overlay.style.display = 'none';
                }
            }
        });
    </script>

    <style>
        :root {
            --gura-blue: #99CCFF;
            --gura-dark: #0a0e14;
            --gura-accent: #3399FF;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--gura-dark);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* Ảnh mặc định khi chưa load xong Firebase */
            background: url(https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg) no-repeat center center fixed;
            background-size: cover; filter: blur(5px) brightness(0.4);
            z-index: -1;
            transition: background 0.5s ease, background-color 0.5s ease;
        }

        /* Giữ nguyên các Style cũ của Orichiin-san */
        .pure-nav {
            height: 60px; background: rgba(0, 0, 0, 0.7);
            display: flex; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--gura-blue); width: 100%;
        }
        .wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .section-title { color: var(--gura-blue); font-size: 2rem; font-weight: bold; margin-bottom: 30px; text-shadow: 0 0 15px rgba(153, 204, 255, 0.5); }
        .app-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 900px; }
        .app-card { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(153, 204, 255, 0.3); border-radius: 20px; padding: 25px; text-align: center; transition: 0.3s; backdrop-filter: blur(10px); }
        .app-card:hover { background: rgba(153, 204, 255, 0.1); transform: translateY(-10px); border-color: var(--gura-blue); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .app-icon { width: 90px; height: 90px; margin-bottom: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .app-name { font-weight: bold; font-size: 1.3rem; margin: 10px 0; color: white; }
        .app-desc { font-size: 0.9rem; color: #ccc; margin-bottom: 20px; line-height: 1.4; }
        .app-buttons { display: flex; gap: 12px; }
        .btn-app-view, .btn-app-dl { padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.2s; flex: 1; text-transform: uppercase; }
        .btn-app-view { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-app-dl { background: linear-gradient(45deg, var(--gura-accent), #0072ff); color: white; }
        #preview-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 20000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        #preview-img { max-width: 85%; max-height: 80%; border-radius: 15px; border: 2px solid var(--gura-blue); box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        #main-popup { width: 90%; max-width: 500px; min-height: 300px; border-radius: 30px; position: relative; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border: 1px solid var(--gura-blue); }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="preview-overlay" onclick="this.style.display='none'">
        <img id="preview-img" src="">
        <p style="position:absolute; bottom:30px; color:#99CCFF; font-weight:bold;">BẤM ĐỂ ĐÓNG</p>
    </div>

    <div id="popup-overlay">
        <div id="main-popup">
            <button onclick="document.getElementById('popup-overlay').style.display='none'" style="position: absolute; top: 15px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 24px; cursor: pointer; border-radius: 50%; width: 35px; height: 35px;">&times;</button>
            <div id="popup-text"></div>
        </div>
    </div>

    <nav class="pure-nav">
        <div style="font-weight: bold; color: var(--gura-blue); font-size: 1.2rem; letter-spacing: 2px;">ORICHIIN STUDIO 🦈</div>
    </nav>

    <div class="wrapper">
        <div class="section-title">🚀 APPS COLLECTION</div>
        
        <div class="app-container">
            <div class="app-card">
                <img src="logo_orc.png" class="app-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2522/2522649.png'">
                <div class="app-name">ORC Downloader</div>
                <div class="app-desc">Phần mềm tải video m3u8 chuyên dụng. Tốc độ cao, hỗ trợ ghép nối file tự động.</div>
                <div class="app-buttons">
                    <button class="btn-app-view" onclick="previewApp('https://i.imgur.com/your-screenshot-link.png')">Xem trước</button>
                    <button class="btn-app-dl" onclick="window.open('https://www.hentaiorc.xyz/fix_hls.pyw.exe')">Tải bản .exe</button>
                </div>
            </div>

            <div class="app-card">
                <img src="https://cdn-icons-png.flaticon.com/512/1055/1055683.png" class="app-icon">
                <div class="app-name">ORC Network Tool</div>
                <div class="app-desc">Kiểm tra thông số mạng, quét IP trong LAN và quản lý Router nhanh chóng.</div>
                <div class="app-buttons">
                    <button class="btn-app-view" onclick="previewApp('https://i.imgur.com/example-screenshot.png')">Xem trước</button>
                    <button class="btn-app-dl" onclick="alert('Đang phát triển...')">Tải về</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function previewApp(imgUrl) {
            const overlay = document.getElementById('preview-overlay');
            const img = document.getElementById('preview-img');
            img.src = imgUrl;
            overlay.style.display = 'flex';
        }
    </script>
</body>
</html>
