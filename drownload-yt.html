<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORICHIIN PURE - GAWR GURA EDITION</title>
    <style>
        :root {
            --gura-blue: #99CCFF;
            --gura-dark: #0a0e14;
            --gura-accent: #3399FF;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--gura-dark);
            color: white; font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* BACKGROUND MỜ ẢO */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url(https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg) no-repeat center center fixed;
            background-size: cover; filter: blur(5px) brightness(0.4);
            z-index: -1;
        }

        /* HEADER KIỂU PURE */
        .pure-nav {
            height: 60px; background: rgba(0, 0, 0, 0.7);
            display: flex; align-items: center; padding: 0 20px;
            border-bottom: 2px solid var(--gura-blue);
            position: sticky; top: 0; z-index: 100;
        }

        .search-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            gap: 10px;
        }

        .pure-input {
            width: 60%; background: rgba(255,255,255,0.1);
            border: 1px solid var(--gura-blue); border-radius: 20px;
            padding: 10px 20px; color: white; outline: none;
        }

        /* KHUNG PHÁT VIDEO TRUNG TÂM */
        .main-stage {
            max-width: 1100px; margin: 20px auto;
            background: rgba(0,0,0,0.8); border-radius: 15px;
            overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .video-box {
            position: relative; width: 100%; padding-top: 56.25%; /* Ratio 16:9 */
            background: #000;
        }

        .video-box iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        /* THANH CÔNG CỤ TẢI VỀ PURE */
        .action-bar {
            padding: 15px 20px; display: flex; align-items: center;
            justify-content: space-between; background: rgba(255,255,255,0.05);
        }

        .video-title { font-weight: bold; color: var(--gura-blue); font-size: 1.1rem; }

        .btn-download {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white; border: none; padding: 10px 25px;
            border-radius: 25px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            transition: 0.3s;
        }

        .btn-download:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,114,255,0.4); }

        .btn-download i { font-size: 1.2rem; }

        /* DANH SÁCH GỢI Ý */
        .suggestions {
            max-width: 1100px; margin: 20px auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px; padding: 0 10px;
        }

        .card {
            background: rgba(255,255,255,0.05); border-radius: 10px;
            padding: 10px; cursor: pointer; transition: 0.3s;
        }
        .card:hover { background: rgba(153, 204, 255, 0.2); }
        .card img { width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <nav class="pure-nav">
        <div style="font-weight: bold; color: var(--gura-blue);">ORICHIIN PURE 🦈</div>
        <div class="search-container">
            <input type="text" id="search-input" class="pure-input" placeholder="Dán link YouTube hoặc tìm kiếm...">
            <button onclick="updatePlayer()" style="background: none; border: none; color: var(--gura-blue); cursor: pointer; font-size: 1.5rem;">🔍</button>
        </div>
    </nav>

    <div class="main-stage">
        <div class="video-box">
            <iframe id="main-player" src="https://www.youtube-nocookie.com/embed/videoseries?list=PLw-VjHDlEOgs658kAHR_LAHi0wF-6YfRL" allowfullscreen></iframe>
        </div>
        
        <div class="action-bar">
            <div>
                <div class="video-title" id="display-title">Đang phát: Danh sách thịnh hành</div>
                <div style="font-size: 0.8rem; color: #aaa; margin-top: 5px;">Hệ thống Orichiin Pure đã sẵn sàng.</div>
            </div>
            <button class="btn-download" onclick="startDownload()">
                <span>📥 TẢI VỀ (PURE)</span>
            </button>
        </div>
    </div>

    <div class="suggestions">
        <div class="card" onclick="loadByVideoId('dQw4w9WgXcQ')">
            <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg">
            <p style="font-size: 0.8rem;">Never Gonna Give You Up</p>
        </div>
        <div class="card" onclick="loadByVideoId('5X77P-uY-eA')">
            <img src="https://img.youtube.com/vi/5X77P-uY-eA/mqdefault.jpg">
            <p style="font-size: 0.8rem;">Gawr Gura Lo-fi</p>
        </div>
    </div>

    <script>
        let currentVideoUrl = "";

        function updatePlayer() {
            const input = document.getElementById('search-input').value.trim();
            const player = document.getElementById('main-player');
            const title = document.getElementById('display-title');

            if (input.includes('youtu')) {
                const id = extractID(input);
                if (id) {
                    currentVideoUrl = input;
                    player.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&showinfo=0`;
                    title.innerText = "Đang phát video: " + id;
                }
            } else {
                alert("Orichiin-san dán link YouTube vào để Gem xử lý nhé!");
            }
        }

        function loadByVideoId(id) {
            const player = document.getElementById('main-player');
            currentVideoUrl = `https://www.youtube.com/watch?v=${id}`;
            player.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1`;
            document.getElementById('display-title').innerText = "Đang phát video: " + id;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function startDownload() {
            if (!currentVideoUrl) {
                alert("Orichiin-san hãy chọn một video để tải nhé!");
                return;
            }
            
            // Lựa chọn bộ máy tải về để tránh bị chặn và hỗ trợ 1080p/4K
            const choice = confirm("Orichiin-san muốn chọn chất lượng nào?\n\n- Nhấn OK: Tải chất lượng cao 1080p/4K (Cobalt engine)\n- Nhấn Cancel: Tải nhanh (SaveFrom engine)");

            if (choice) {
                // Cobalt engine: Sạch, hỗ trợ cao, không bị chặn bởi file local
                window.open(`https://cobalt.tools/`, '_blank');
            } else {
                // SaveFrom engine: Đã mã hóa URL để tránh bị lỗi "Blocked" khi chạy file từ ổ đĩa
                const cleanUrl = currentVideoUrl.split('&')[0];
                const dlUrl = `https://en1.savefrom.net/11Ox/sf?url=${encodeURIComponent(cleanUrl)}`;
                window.open(dlUrl, '_blank');
            }
        }

        function extractID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?)\??v?=?)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }
    </script>
</body>
</html>
