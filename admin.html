<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ADMIN PANEL - ORICHIIN</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        // THÊM: setPersistence và browserSessionPersistence để xóa khi đóng trình duyệt
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHEntigIN79IuzszmWDL6nnDxO5yp748I",
            authDomain: "admin-bd0ff.firebaseapp.com",
            projectId: "admin-bd0ff",
            storageBucket: "admin-bd0ff.appspot.com",
            messagingSenderId: "721293740677",
            appId: "1:721293740677:web:8c6ae2228e9af16aa437ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // THÊM: Theo dõi trạng thái đăng nhập từ Server
        onAuthStateChanged(auth, (user) => {
            if (user && user.uid === "Lpth1LUWV6MCPDfVh1sq2iaMOKy1") {
                document.getElementById('auth-overlay').style.display = 'none';
                // Gán giá trị giả định để không làm lỗi logic saveNotice cũ của mình
                document.getElementById('adminPass').value = "@Orichiincompany"; 
            } else {
                // Đảm bảo hiện lại màn hình khóa nếu không có user (sau khi đóng trình duyệt mở lại)
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        });

        // PHẦN KIỂM TRA ĐĂNG NHẬP (ĐÃ CHUYỂN LÊN CLOUD)
        window.accessPanel = async () => {
            const email = "leduongtrinhan10125@gmail.com"; // Email mình đã tạo trên Firebase
            const entryPass = document.getElementById('entryPass').value;
            
            try {
                // THÊM: Yêu cầu Firebase chỉ lưu phiên trong session hiện tại
                await setPersistence(auth, browserSessionPersistence);
                // Gửi yêu cầu xác thực lên Server Google
                await signInWithEmailAndPassword(auth, email, entryPass);
            } catch (error) {
                alert("Sai mật khẩu hoặc lỗi truy cập Cloud!");
            }
        };

        window.saveNotice = async () => {
            const pass = document.getElementById('adminPass').value;
            const content = document.getElementById('noticeInput').value;
            const btn = document.getElementById('saveBtn');

            // Mật khẩu của Orichiin-san
            if (pass !== "@Orichiincompany") return alert("Sai mật khẩu vui lòng thử lại!");
            if (!content) return alert("Chưa nhập nội dung thông báo nè!");

            btn.disabled = true;
            btn.innerText = "ĐANG ĐẨY DỮ LIỆU & REFRESH WEB...";

            try {
                // Tạo một mã ngẫu nhiên để kích hoạt reload ở các máy khác
                const reloadKey = Math.random().toString(36).substring(7);

                await setDoc(doc(db, "settings", "notice"), { 
                    content: content,
                    timestamp: new Date().getTime(),
                    reloadTrigger: reloadKey // Dòng này cực kỳ quan trọng để các web khác tự F5
                });
                alert("Cập nhật thành công! Tất cả các trang đang mở sẽ tự tải lại.");
            } catch (e) {
                alert("Lỗi kết nối Firebase hoặc quyền hạn: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "CẬP NHẬT NGAY";
            }
        };
    </script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #151515; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #99CCFF; text-align: center; margin-bottom: 25px; }
        input, textarea { width: 100%; background: #202020; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #99CCFF; }
        button { width: 100%; background: #99CCFF; color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: white; transform: translateY(-2px); }
        button:disabled { background: #555; cursor: not-allowed; }

        /* STYLE CHO MÀN HÌNH KHÓA MỚI THÊM */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; z-index: 10000; display: flex;
            justify-content: center; align-items: center;
        }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="card">
            <h2>XÁC MINH QUYỀN ADMIN</h2>
            <input type="password" id="entryPass" placeholder="Nhập mật khẩu để mở khóa...">
            <button onclick="accessPanel()">MỞ KHÓA PANEL</button>
        </div>
    </div>

    <div class="card">
        <h2>ORC ADMIN PANEL</h2>
        <input type="password" id="adminPass" placeholder="Nhập mật khẩu Admin...">
        <textarea id="noticeInput" rows="4" placeholder="Nhập nội dung thông báo mới..."></textarea>
        <button id="saveBtn" onclick="saveNotice()">CẬP NHẬT NGAY</button>
        <p style="text-align: center;"><a href="index.html" style="color: #555; text-decoration: none; font-size: 0.8rem;">Quay lại Trang chủ</a></p>
    </div>
</body>
</html>
