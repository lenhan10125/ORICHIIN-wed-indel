<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ADMIN PANEL - ORICHIIN</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHEntigIN79IuzszmWDL6nnDxO5yp748I",
            authDomain: "admin-bd0ff.firebaseapp.com",
            projectId: "admin-bd0ff",
            storageBucket: "admin-bd0ff.appspot.com",
            messagingSenderId: "721293740677",
            appId: "1:721293740677:web:8c6ae2228e9af16aa437ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user && user.uid === "Lpth1LUWV6MCPDfVh1sq2iaMOKy1") {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('adminPass').value = "@Orichiincompany"; 
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        });

        window.accessPanel = async () => {
            const email = "leduongtrinhan10125@gmail.com"; 
            const entryPass = document.getElementById('entryPass').value;
            
            try {
                await setPersistence(auth, browserSessionPersistence);
                await signInWithEmailAndPassword(auth, email, entryPass);
            } catch (error) {
                alert("Sai mật khẩu hoặc lỗi truy cập Cloud!");
            }
        };

        window.saveNotice = async () => {
            const pass = document.getElementById('adminPass').value;
            const content = document.getElementById('noticeInput').value;
            const btn = document.getElementById('saveBtn');

            if (pass !== "@Orichiincompany") return alert("Sai mật khẩu vui lòng thử lại!");
            if (!content) return alert("Chưa nhập nội dung thông báo nè!");

            btn.disabled = true;
            btn.innerText = "ĐANG ĐẨY DỮ LIỆU & REFRESH WEB...";

            try {
                const reloadKey = Math.random().toString(36).substring(7);
                await setDoc(doc(db, "settings", "notice"), { 
                    content: content,
                    timestamp: new Date().getTime(),
                    reloadTrigger: reloadKey 
                });
                alert("Cập nhật thành công! Tất cả các trang đang mở sẽ tự tải lại.");
            } catch (e) {
                alert("Lỗi kết nối Firebase hoặc quyền hạn: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "CẬP NHẬT NGAY";
            }
        };

        // --- PHẦN THÊM MỚI: LOGIC QUẢN LÝ POPUP ---
        window.savePopup = async () => {
            const btn = document.getElementById('savePopupBtn');
            const popupData = {
                content: document.getElementById('popupContent').value,
                bgColor: document.getElementById('popupBg').value,
                textColor: document.getElementById('popupTextColor').value,
                fontSize: document.getElementById('popupFontSize').value + "px",
                fontFamily: document.getElementById('popupFont').value,
                active: true,
                timestamp: new Date().getTime()
            };

            if (!popupData.content) return alert("Vui lòng nhập nội dung Popup!");

            btn.disabled = true;
            btn.innerText = "ĐANG LƯU POPUP...";

            try {
                await setDoc(doc(db, "settings", "popup"), popupData);
                alert("Đã cập nhật Popup thành công!");
            } catch (e) {
                alert("Lỗi: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "LƯU & BẬT POPUP";
            }
        };

        window.deletePopup = async () => {
            if(!confirm("Bạn muốn xóa/ẩn Popup này khỏi trang chủ?")) return;
            try {
                await setDoc(doc(db, "settings", "popup"), { active: false });
                alert("Đã ẩn Popup!");
            } catch (e) { alert("Lỗi: " + e.message); }
        };
    </script>
    <style>
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; /* Để xếp các card theo chiều dọc */
            justify-content: flex-start; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 0;
            overflow-y: auto;
        }
        .card { 
            background: rgba(21, 21, 21, 0.85); 
            backdrop-filter: blur(10px);
            padding: 35px; 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 90%; 
            max-width: 500px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
            margin-bottom: 30px;
        }
        h2 { 
            color: #99CCFF; 
            text-align: center; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(153, 204, 255, 0.3);
            text-transform: uppercase;
            font-size: 1.2rem;
        }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaa; }
        input, textarea, select { 
            width: 100%; 
            background: rgba(32, 32, 32, 0.7); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
        }
        input:focus, textarea:focus { border-color: #99CCFF; background: rgba(45, 45, 45, 0.9); }
        
        .flex-row { display: flex; gap: 10px; }
        .flex-row > div { flex: 1; }

        button { 
            width: 100%; 
            background: #99CCFF; 
            color: black; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase;
        }
        button:hover { background: white; transform: translateY(-2px); }
        .btn-delete { background: #ff6b6b; color: white; margin-top: 10px; }
        .btn-delete:hover { background: #ff5252; }

        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex;
            justify-content: center; align-items: center;
        }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="card">
            <h2>XÁC MINH QUYỀN ADMIN</h2>
            <input type="password" id="entryPass" placeholder="Nhập mật khẩu để mở khóa...">
            <button onclick="accessPanel()">MỞ KHÓA PANEL</button>
        </div>
    </div>

    <div class="card">
        <h2>📢 THÔNG BÁO DÒNG CHỮ</h2>
        <input type="password" id="adminPass" placeholder="Nhập mật khẩu Admin..." style="display:none;">
        <textarea id="noticeInput" rows="3" placeholder="Nội dung thông báo chạy..."></textarea>
        <button id="saveBtn" onclick="saveNotice()">CẬP NHẬT DÒNG CHỮ</button>
    </div>

    <div class="card">
        <h2>🖼️ CẤU HÌNH POPUP TỰ BẬT</h2>
        
        <label>Link Hình Nền Popup (Dán URL ảnh):</label>
        <input type="text" id="popupBg" placeholder="https://example.com/image.jpg">
        
        <div class="flex-row">
            <div>
                <label>Màu chữ:</label>
                <input type="color" id="popupTextColor" value="#ffffff" style="height: 45px;">
            </div>
            <div>
                <label>Cỡ chữ (px):</label>
                <input type="number" id="popupFontSize" value="18">
            </div>
        </div>

        <label>Font chữ:</label>
        <select id="popupFont">
            <option value="'Segoe UI', sans-serif">Segoe UI</option>
            <option value="'Roboto', sans-serif">Roboto</option>
            <option value="'Oswald', sans-serif">Oswald (Mạnh mẽ)</option>
            <option value="'Pacifico', cursive">Pacifico (Nghệ thuật)</option>
        </select>

        <label>Nội dung hiển thị:</label>
        <textarea id="popupContent" rows="4" placeholder="Nhập nội dung Popup..."></textarea>
        
        <button id="savePopupBtn" onclick="savePopup()" style="background: #99FFCC;">LƯU & BẬT POPUP</button>
        <button class="btn-delete" onclick="deletePopup()">XÓA / ẨN POPUP</button>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #666; text-decoration: none; font-size: 0.8rem;">← Quay lại Trang chủ</a>
        </p>
    </div>
</body>
</html>
