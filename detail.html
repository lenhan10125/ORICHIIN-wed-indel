<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHI TIẾT TÁC PHẨM | ORC STUDIO</title>
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
            --glass-bg: rgba(15, 15, 15, 0.9);
            --border-glow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #101010 0%, #050505 100%);
            min-height: 100vh;
        }

        /* HIỆU ỨNG NỀN ĐỘNG */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(0, 242, 255, 0.05) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .container {
            position: relative; z-index: 1;
            max-width: 1200px; margin: 40px auto; padding: 20px;
            display: flex; flex-wrap: wrap; gap: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* KHỐI HIỂN THỊ ẢNH */
        .image-section {
            flex: 1; min-width: 350px;
            position: relative; border-radius: 20px;
            overflow: hidden; box-shadow: var(--border-glow);
            border: 1px solid rgba(0, 242, 255, 0.3);
            background: #000; height: fit-content;
        }

        .image-section img {
            width: 100%; display: block;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .image-section:hover img { transform: scale(1.05); }

        /* KHỐI THÔNG TIN */
        .info-section {
            flex: 1; min-width: 350px;
            background: var(--glass-bg); padding: 40px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .badge {
            display: inline-block; padding: 5px 15px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border-radius: 50px; font-size: 12px; font-weight: bold;
            text-transform: uppercase; margin-bottom: 15px;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .price-tag {
            font-size: 2rem; color: var(--neon-blue);
            font-weight: 900; margin: 20px 0;
            display: flex; align-items: center; gap: 10px;
        }

        .description {
            color: #aaa; line-height: 1.8; margin-bottom: 30px;
            padding: 20px; background: rgba(0,0,0,0.3); border-radius: 10px;
            white-space: pre-line;
        }

        /* NÚT BẤM */
        .actions { display: flex; flex-direction: column; gap: 15px; }

        .btn-buy {
            width: 100%; padding: 18px;
            background: var(--neon-blue); color: #000;
            border: none; border-radius: 12px; font-weight: bold;
            font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .btn-buy:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px var(--neon-blue);
            filter: brightness(1.2);
        }

        .btn-back {
            background: transparent; border: 1px solid #444;
            color: #888; padding: 12px; border-radius: 12px;
            cursor: pointer; transition: 0.3s;
        }

        .btn-back:hover { border-color: #fff; color: #fff; }

        /* PHẦN FOOTER CHI TIẾT */
        .meta-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px; margin-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;
        }

        .meta-item span { display: block; color: #555; font-size: 12px; text-transform: uppercase; }
        .meta-item p { color: #eee; font-weight: bold; margin-top: 5px; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container { margin: 10px; padding: 10px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow" id="glow"></div>

    <div class="container">
        <div class="image-section">
            <img id="p-img" src="https://i.gifer.com/ZKZg.gif" alt="Artwork">
        </div>

        <div class="info-section">
            <div class="badge">Original Artwork</div>
            <h1 id="p-name">Đang tải...</h1>
            <p id="p-id" style="color: #444; font-size: 0.8rem; margin-bottom: 10px;"></p>
            
            <div class="price-tag">
                <span id="p-price">0</span>
                <small style="font-size: 14px; color: #666;">VNĐ</small>
            </div>

            <div class="description" id="p-desc">
                Đang lấy thông tin mô tả chi tiết từ hệ thống...
            </div>

            <div class="actions">
                <button class="btn-buy" id="buy-btn">MUA NGAY QUA MESSENGER</button>
                <button class="btn-back" onclick="history.back()">QUAY LẠI CỬA HÀNG</button>
            </div>

            <div class="meta-grid">
                <div class="meta-item">
                    <span>Trạng thái</span>
                    <p style="color: #00ff88;">Sẵn có</p>
                </div>
                <div class="meta-item">
                    <span>Lượt xem</span>
                    <p id="p-views">--</p>
                </div>
                <div class="meta-item">
                    <span>Đã bán</span>
                    <p id="p-sold">0</p>
                </div>
                <div class="meta-item">
                    <span>Phát hành</span>
                    <p>2026</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHEntigIN79IuzszmWDL6nnDxO5yp748I",
            authDomain: "admin-bd0ff.firebaseapp.com",
            projectId: "admin-bd0ff",
            storageBucket: "admin-bd0ff.appspot.com",
            messagingSenderId: "721293740677",
            appId: "1:721293740677:web:8c6ae2228e9af16aa437ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');

        async function loadProductDetail() {
            if (!productId) {
                document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px;'>THIẾU MÃ SẢN PHẨM</h1>";
                return;
            }

            try {
                const docRef = doc(db, "products", productId);
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    const data = snap.data();
                    
                    document.getElementById('p-img').src = data.img || 'https://via.placeholder.com/500';
                    document.getElementById('p-name').innerText = data.name || "Không tên";
                    document.getElementById('p-id').innerText = "MÃ SỐ: " + productId.toUpperCase();
                    document.getElementById('p-price').innerText = new Intl.NumberFormat('vi-VN').format(data.price || 0);
                    document.getElementById('p-desc').innerText = data.description || "Tác phẩm độc quyền từ ORC Studio.";
                    document.getElementById('p-sold').innerText = data.purchases || 0;
                    document.getElementById('p-views').innerText = Math.floor(Math.random() * 500) + 100;

                    document.getElementById('buy-btn').onclick = () => {
                        const msg = `Chào ORC Studio, mình muốn mua tranh: ${data.name} (ID: ${productId})`;
                        window.open(`https://m.me/langducabpt?text=${encodeURIComponent(msg)}`, '_blank');
                    };
                } else {
                    document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px;'>TÁC PHẨM KHÔNG TỒN TẠI</h1>";
                }
            } catch (error) {
                console.error("Lỗi tải dữ liệu:", error);
                document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px;'>LỖI KẾT NỐI HỆ THỐNG</h1>";
            }
        }

        document.addEventListener('mousemove', (e) => {
            const glow = document.getElementById('glow');
            if(glow) {
                glow.style.setProperty('--x', e.clientX + 'px');
                glow.style.setProperty('--y', e.clientY + 'px');
            }
        });

        loadProductDetail();
    </script>
</body>
</html>
