    <style>
        /* FONTS */
        @font-face {
            font-family: 'Lato';
            src: url(https://img1.wsimg.com/gfonts/s/lato/v25/S6uyw4BMUTPHjx4wXg.woff2) format('woff2');
        }
        @font-face {
            font-family: 'Lusitana';

        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Để không bị hiện thanh cuộn khi có video full màn hình */
            font-family: 'Lato', sans-serif;
            color: #FFFFFF !important;
        }

        /* CẤU HÌNH VIDEO NỀN */
        #video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100; /* Đẩy video ra sau cùng */
            object-fit: cover; /* Phủ kín màn hình */
            background: #000; /* Dự phòng nếu video chưa load xong */
        }

        /* Hiệu ứng đổ bóng chữ */
        :not(textarea):not(input):not([contenteditable]) {
            text-shadow: 0 0.05em rgba(0,0,0,.8), 0 -0.05em rgba(0,0,0,.8), 0.05em 0 rgba(0,0,0,.8), -0.05em 0 rgba(0,0,0,.8) !important;
        }

        h1 {
            font-family: 'Lusitana', serif;
            color: #d9b8ab;
            text-align: center;
            font-size: 2.5em;
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-box {
            max-width: 800px;
            background-color: rgba(0, 0, 0, 0.8) !important; 
            padding: 40px;
            border-radius: 20px;
            box-shadow: inset 0px 0px 0px 1px rgba(255,255,255,.3) !important;
            text-align: center;
            backdrop-filter: blur(10px); /* Làm mờ video phía sau khung chữ */
        }

        /* Màu liên kết */
        a:link { color: #99CCFF !important; text-decoration: none; }
        a:visited { color: #CC99FF !important; }
        a:hover { text-decoration: underline; }

    </style>
