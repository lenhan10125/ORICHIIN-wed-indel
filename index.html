<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORICHIIN</title>

    <style>
        /* FONTS */
        @font-face {
            font-family: 'Lato';
            src: url(https://img1.wsimg.com/gfonts/s/lato/v25/S6uyw4BMUTPHjx4wXg.woff2) format('woff2');
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Lato', sans-serif;
            color: #FFFFFF !important;
            /* THIẾT LẬP NỀN ẢNH GURA CỐ ĐỊNH */
            background: url(https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg) no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        /* --- PHẦN CSS CHO LOADING SCREEN --- */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111; /* Nền tối khi đang load */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.1);
            border-top: 6px solid #99CCFF; /* Màu xanh ton-sur-ton với link */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Lớp để ẩn loader */
        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }
        /* ---------------------------------- */

        /* KHUNG CHỨA TOÀN BỘ ĐỂ CĂN GIỮA */
        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            opacity: 0; /* Mặc định ẩn nội dung để làm hiệu ứng hiện dần */
            transition: opacity 1s ease-in;
        }

        .container.show {
            opacity: 1;
        }

        /* KHUNG NỘI DUNG (CONTENT BOX) */
        .content-box {
            max-width: 600px;
            padding: 40px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin: 20px;
        }

        h1 {
            color: #d9b8ab;
            margin-top: 0;
            font-size: 2.5em;
            text-shadow: 0 0.05em rgba(0,0,0,.8) !important;
        }

        p {
            line-height: 1.6;
            font-size: 1.1em;
            text-shadow: 0 0.05em rgba(0,0,0,.8) !important;
        }

        a {
            color: #99CCFF;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="spinner"></div>
    </div>

    <div class="container" id="main-content">
        <div class="content-box">
            <h1>ORICHIIN STUDIO</h1>
            <p>Trang web đang trong quá trình phát triển - hiện chưa truy cập được vui lòng quay lại sau nhé!!!</p>
            <p>Dự án chính: <a href="https://hentaiorc.xyz">ORC-STUDIO</a></p>
            <p>Youtube: <a href="https://www.youtube.com/@ORIICHIN" target="_blank">@ORIICHIN</a></p>
        </div>
    </div>

    <script>
        window.addEventListener("load", function() {
            const loader = document.getElementById("loader-wrapper");
            const content = document.getElementById("main-content");

            // Thêm class để kích hoạt hiệu ứng mờ dần trong CSS
            loader.classList.add("loader-hidden");
            content.classList.add("show");
        });
    </script>

</body>
</html>
