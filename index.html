<head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAHEntigIN79IuzszmWDL6nnDxO5yp748I",
            authDomain: "admin-bd0ff.firebaseapp.com",
            projectId: "admin-bd0ff",
            storageBucket: "admin-bd0ff.appspot.com",
            messagingSenderId: "721293740677",
            appId: "1:721293740677:web:8c6ae2228e9af16aa437ec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let lastReloadKey = null;
        onSnapshot(doc(db, "settings", "notice"), (doc) => {
            if (doc.exists()) {
                const data = doc.data();
                document.getElementById('live-notice').innerText = data.content;
                if (lastReloadKey !== null && data.reloadTrigger !== lastReloadKey) {
                    location.reload(); 
                }
                lastReloadKey = data.reloadTrigger;
            }
        });
        onSnapshot(doc(db, "settings", "popup"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const overlay = document.getElementById('popup-overlay');
                const mainPopup = document.getElementById('main-popup');
                const textElement = document.getElementById('popup-text');
                if (data.active === true) {
                    if (data.bgColor && data.bgColor.startsWith('http')) {
                        mainPopup.style.background = `url('${data.bgColor}') no-repeat center center`;
                        mainPopup.style.backgroundSize = "cover";
                    } else {
                        mainPopup.style.background = data.bgColor || "rgba(0,0,0,0.9)";
                    }
                    textElement.style.color = data.textColor || "#ffffff";
                    textElement.style.fontSize = data.fontSize || "18px";
                    textElement.style.fontFamily = data.fontFamily || "sans-serif";
                    textElement.innerText = data.content || "";
                    overlay.style.display = 'flex';
                } else {
                    overlay.style.display = 'none';
                }
            }
        });
    </script>
    <style>
        @font-face {

        .hamburger { width: 20px; height: 14px; position: relative; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }

        .header-center { flex: 0 1 720px; margin: 0 15px; }
        .search-container {
            display: flex; background: rgba(0, 0, 0, 0.4);

            overflow: hidden; padding-left: 20px;
        }
        .search-input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 14px; height: 40px; }
        .search-btn { background: rgba(255,255,255,0.1); border: none; width: 64px; height: 40px; border-left: 1px solid var(--yt-border); cursor: pointer; }
        .search-btn svg { width: 20px; height: 20px; fill: white; }
        .menu-overlay {
            position: fixed; top: 65px; left: 16px;
            width: fit-content; height: auto;
            min-width: 260px; padding: 25px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            z-index: 1500;
            display: flex; flex-direction: column;
            transform-origin: top left;
            transform: scale(0); opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .menu-overlay.active { transform: scale(1); opacity: 1; pointer-events: auto; }
        .nav-content { display: flex; flex-direction: column; text-align: left; }
        .nav-item {
            font-size: 1.3rem; color: #99CCFF; text-decoration: none;
            font-weight: bold; margin: 10px 0; transition: 0.3s;
        }
        .nav-item:hover { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); transform: translateX(8px); }
        .ambient-dust { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .dust-particle { position: absolute; background: white; border-radius: 50%; opacity: 0.4; filter: blur(1px); animation: floatDust linear infinite; }
        @keyframes floatDust {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
        .particle { position: fixed; pointer-events: none; width: 4px; height: 4px; background: var(--neon-blue); border-radius: 50%; box-shadow: 0 0 10px var(--neon-blue); z-index: 2200; animation: particleFly 1s forwards; }
        @keyframes particleFly {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c8b8f; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-top-img { width: 360px; height: auto; margin-bottom: 20px; }
        .neon-loading-container { width: 320px; margin: 10px 0; }
        .neon-text-row { display: flex; justify-content: space-between; color: var(--neon-flame); font-weight: bold; font-size: 18px; text-shadow: 0 0 10px var(--neon-flame); margin-bottom: 8px; }
        .neon-bar-border { width: 100%; height: 22px; border: 2px solid var(--neon-flame); border-radius: 15px; padding: 2px; box-sizing: border-box; box-shadow: 0 0 10px var(--neon-flame); }
        .neon-bar-fill { height: 100%; width: 0%; background: var(--neon-flame); border-radius: 10px; box-shadow: 0 0 20px var(--neon-flame), 0 0 40px var(--neon-flame); animation: flame-glow 0.5s infinite alternate; }
        .loader-hidden { opacity: 0; visibility: hidden; }
        .container { height: 100vh; display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.2); opacity: 0; transition: opacity 1s ease-in; }
        .container.show { opacity: 1; }
        .content-box { position: relative; z-index: 10; max-width: 600px; padding: 40px; border-radius: 25px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        h1 { color: #d9b8ab; font-size: 2.5em; }
    </style>
</head>

    <script>
        const dustContainer = document.getElementById('dustContainer');
        function createDust() {
            const dust = document.createElement('div');
            dust.className = 'dust-particle';
            const size = Math.random() * 3 + 1;
            dust.style.width = size + 'px';
            dust.style.height = size + 'px';
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.top = '110vh';
            dustContainer.appendChild(dust);
            setTimeout(() => dust.remove(), 10000);
        }
        setInterval(createDust, 300);
        const menuBtn = document.getElementById('menuBtn');
        const menuOverlay = document.getElementById('menuOverlay');
        function toggleMenu() {
            menuBtn.classList.toggle('open');
            menuOverlay.classList.toggle('active');
        }
        menuBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
        window.addEventListener('click', (e) => {
            if (menuOverlay.classList.contains('active') && !menuOverlay.contains(e.target) && !menuBtn.contains(e.target)) toggleMenu();
        });
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('mousemove', (e) => {
                for(let i=0; i<4; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = e.clientX + 'px';
                    p.style.top = e.clientY + 'px';
                    p.style.setProperty('--mx', (Math.random() * 200 - 100) + 'px');
                    p.style.setProperty('--my', (Math.random() * -150 - 50) + 'px');
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 1000);
                }
            });
        });
        window.addEventListener("load", function() {
            const loader = document.getElementById("loader-wrapper");
            const content = document.getElementById("main-content");
            const fill = document.getElementById("load-fill");
            const val = document.getElementById("load-val");
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 10;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        loader.classList.add("loader-hidden");
                        content.classList.add("show");
                    }, 500);
                }
                if(fill) fill.style.width = progress + "%";
                if(val) val.innerText = Math.floor(progress) + "%";
            }, 150);
        });
    </script>
