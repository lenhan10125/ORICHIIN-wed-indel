<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORICHIIN</title>

    <style>
        /* FONTS */
        @font-face {
            font-family: 'Lato';
            src: url(https://img1.wsimg.com/gfonts/s/lato/v25/S6uyw4BMUTPHjx4wXg.woff2) format('woff2');
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Lato', sans-serif;
            color: #FFFFFF !important;
            /* GIỮ NGUYÊN NỀN GURA CỦA ORICHIIN */
            background: url(https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg) no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        /* --- PHẦN CSS CHO LOADING SCREEN --- */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #78c7d7; /* Nền đen tuyền để che ảnh nền Gura lúc đang load */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        /* PHẦN ẢNH MỚI THÊM VÀO */
        .loader-top-img {
            width: 360px; /* Orichiin tự thay đổi kích thước nếu cần */
            height: auto;
            margin-bottom: 20px;
        }

        /* Icon loading (Bạn có thể thay link ảnh icon khác ở dưới) */
        .loader-icon {
            width: 80px; 
            height: auto;
            animation: spin 2s linear infinite; /* Cho nó xoay tròn */
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }
        /* ---------------------------------- */

        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            opacity: 0; 
            transition: opacity 1s ease-in;
        }

        .container.show {
            opacity: 1;
        }

        .content-box {
            max-width: 600px;
            padding: 40px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin: 20px;
        }

        h1 {
            color: #d9b8ab;
            margin-top: 0;
            font-size: 2.5em;
            text-shadow: 0 0.05em rgba(0,0,0,.8) !important;
        }

        p {
            line-height: 1.6;
            font-size: 1.1em;
            text-shadow: 0 0.05em rgba(0,0,0,.8) !important;
        }

        a {
            color: #99CCFF;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <img src="ORC.png" alt="Logo" class="loader-top-img">
        
        <img src="https://i.gifer.com/ZZ5H.gif" alt="Loading..." class="loader-icon">
        <p style="color: #99CCFF; margin-top: 20px; font-weight: bold;">ĐANG TẢI...</p>
    </div>

    <div class="container" id="main-content">
        <div class="content-box">
            <h1>ORICHIIN STUDIO</h1>
            <p>Trang web đang trong quá trình phát triển - hiện chưa truy cập được vui lòng quay lại sau nhé!!!</p>
            <p>Dự án chính: <a href="https://hentaiorc.xyz">ORC-STUDIO</a></p>
            <p>Youtube: <a href="https://www.youtube.com/@ORIICHIN" target="_blank">@ORIICHIN</a></p>
        </div>
    </div>

    <script>
        window.addEventListener("load", function() {
            const loader = document.getElementById("loader-wrapper");
            const content = document.getElementById("main-content");

            setTimeout(() => {
                loader.classList.add("loader-hidden");
                content.classList.add("show");
            }, 5000); // Đợi 5s cho mượt
        });
    </script>

</body>
</html>
