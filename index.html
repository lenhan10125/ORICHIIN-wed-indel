<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORICHIIN</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAHEntigIN79IuzszmWDL6nnDxO5yp748I",
            authDomain: "admin-bd0ff.firebaseapp.com",
            projectId: "admin-bd0ff",
            storageBucket: "admin-bd0ff.appspot.com",
            messagingSenderId: "721293740677",
            appId: "1:721293740677:web:8c6ae2228e9af16aa437ec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let lastReloadKey = null;
        onSnapshot(doc(db, "settings", "notice"), (doc) => {
            if (doc.exists()) {
                const data = doc.data();
                document.getElementById('live-notice').innerText = data.content;
                if (lastReloadKey !== null && data.reloadTrigger !== lastReloadKey) {
                    location.reload(); 
                }
                lastReloadKey = data.reloadTrigger;
            }
        });

        onSnapshot(doc(db, "settings", "popup"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const overlay = document.getElementById('popup-overlay');
                const mainPopup = document.getElementById('main-popup');
                const textElement = document.getElementById('popup-text');
                if (data.active === true) {
                    if (data.bgColor && data.bgColor.startsWith('http')) {
                        mainPopup.style.background = `url('${data.bgColor}') no-repeat center center`;
                        mainPopup.style.backgroundSize = "cover";
                    } else {
                        mainPopup.style.background = data.bgColor || "rgba(0,0,0,0.9)";
                    }
                    textElement.style.color = data.textColor || "#ffffff";
                    textElement.style.fontSize = data.fontSize || "18px";
                    textElement.style.fontFamily = data.fontFamily || "sans-serif";
                    textElement.innerText = data.content || "";
                    overlay.style.display = 'flex';
                } else {
                    overlay.style.display = 'none';
                }
            }
        });
    </script>

    <style>
        @font-face {
            font-family: 'Lato';
            src: url(https://img1.wsimg.com/gfonts/s/lato/v25/S6uyw4BMUTPHjx4wXg.woff2) format('woff2');
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Lato', sans-serif;
            color: #FFFFFF !important;
            background: url(https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg) no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        /* --- NEW NEON MENU STYLE --- */
        .menu-toggle {
            position: fixed; top: 20px; left: 20px;
            width: 50px; height: 50px;
            border: 2px solid #ffcc00; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2000;
            box-shadow: 0 0 15px #ffcc00;
            transition: all 0.4s ease;
            background: rgba(0,0,0,0.5);
        }

        .hamburger { width: 25px; height: 18px; position: relative; display: flex; flex-direction: column; justify-content: space-between; }
        .hamburger span { display: block; width: 100%; height: 3px; background: white; transition: 0.4s; border-radius: 2px; }
        
        .menu-toggle.open { transform: rotate(180deg); }
        .menu-toggle.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
        .menu-toggle.open span:nth-child(2) { opacity: 0; }
        .menu-toggle.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1500;
            display: flex; align-items: center; justify-content: center;
            clip-path: circle(0% at 45px 45px);
            transition: clip-path 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .menu-overlay.active { clip-path: circle(150% at 45px 45px); }

        .nav-content { display: flex; flex-direction: column; text-align: center; }
        .nav-item {
            font-size: 2.5rem; color: black; text-decoration: none;
            font-weight: bold; margin: 15px 0; position: relative;
            transition: 0.3s; padding: 10px 20px;
        }
        .nav-item:hover {
            color: #000;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
        }

        /* Hạt bụi sao Neon */
        .particle {
            position: fixed; pointer-events: none;
            width: 4px; height: 4px; background: #00f3ff;
            border-radius: 50%; box-shadow: 0 0 10px #00f3ff;
            z-index: 2000; animation: flyUp 1s forwards;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) translateX(var(--x)) scale(0); opacity: 0; }
        }

        /* --- KEEP OLD STYLES FOR LOADER & CONTENT --- */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c8b8f; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-top-img { width: 360px; height: auto; margin-bottom: 20px; }
        .neon-loading-container { width: 320px; margin: 10px 0; }
        .neon-text-row { display: flex; justify-content: space-between; color: #00FF00; font-weight: bold; font-size: 18px; text-shadow: 0 0 10px #00FF00; margin-bottom: 8px; }
        .neon-bar-border { width: 100%; height: 22px; border: 2px solid #00FF00; border-radius: 15px; padding: 2px; box-sizing: border-box; }
        .neon-bar-fill { height: 100%; width: 0%; background: #00FF00; border-radius: 10px; box-shadow: 0 0 15px #00FF00; }
        .loader-hidden { opacity: 0; visibility: hidden; }

        .container {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.2); opacity: 0; transition: opacity 1s ease-in;
        }
        .container.show { opacity: 1; }
        .content-box { max-width: 600px; padding: 40px; border-radius: 25px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        h1 { color: #d9b8ab; font-size: 2.5em; }
    </style>
</head>
<body>

    <div class="menu-toggle" id="menuBtn">
        <div class="hamburger">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div class="menu-overlay" id="menuOverlay">
        <nav class="nav-content">
            <a href="https://hentaiorc.xyz" class="nav-item">Trang chủ</a>
            <a href="https://hentaiorc.xyz/chat-server.html" class="nav-item">Chat Server</a>
            <a href="https://hentaiorc.xyz/drownload-yt.html" class="nav-item">Download YT</a>
            <a href="https://hentaiorc.xyz/tags.html" class="nav-item">Thư viện #Tags</a>
        </nav>
    </div>

    <div id="loader-wrapper">
        <img src="ORC.png" alt="Logo" class="loader-top-img">
        <div class="neon-loading-container">
            <div class="neon-text-row"><span>Loading..</span><span id="load-val">0%</span></div>
            <div class="neon-bar-border"><div class="neon-bar-fill" id="load-fill"></div></div>
        </div>
    </div>

    <div id="popup-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10001; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div id="main-popup" style="width: 90%; max-width: 500px; min-height: 300px; border-radius: 30px; position: relative; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
            <button onclick="document.getElementById('popup-overlay').style.display='none'" style="position: absolute; top: 15px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 24px; cursor: pointer; border-radius: 50%; width: 35px; height: 35px;">&times;</button>
            <div id="popup-text" style="word-wrap: break-word; width: 100%; white-space: pre-wrap;"></div>
        </div>
    </div>

    <div class="container" id="main-content">
        <div class="content-box">
            <h1>ORICHIIN STUDIO</h1>
            <p id="live-notice" style="color: #99CCFF; font-weight: bold;">Đang tải thông báo...</p>
            <p>Dự án: <a href="https://hentaiorc.xyz" style="color:#99CCFF">ORC-STUDIO</a></p>
            <p>Youtube: <a href="https://www.youtube.com/@ORIICHIN" target="_blank" style="color:#99CCFF">@ORIICHIN</a></p>
        </div>
    </div>

    <script>
        // Điều khiển Menu & Hiệu ứng X
        const menuBtn = document.getElementById('menuBtn');
        const menuOverlay = document.getElementById('menuOverlay');

        menuBtn.addEventListener('click', () => {
            menuBtn.classList.toggle('open');
            menuOverlay.classList.toggle('active');
        });

        // Hiệu ứng hạt bụi Neon xanh dương khi di chuột vào chữ
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('mousemove', (e) => {
                for(let i=0; i<3; i++) { // Tạo 3 hạt mỗi lần di chuyển chuột
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = e.clientX + 'px';
                    p.style.top = e.clientY + 'px';
                    p.style.setProperty('--x', (Math.random() * 100 - 50) + 'px');
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 1000);
                }
            });
        });

        // Giữ nguyên Logic Loader của ba
        window.addEventListener("load", function() {
            const loader = document.getElementById("loader-wrapper");
            const content = document.getElementById("main-content");
            const fill = document.getElementById("load-fill");
            const val = document.getElementById("load-val");
            const totalTime = 3000; 

            let start = null;
            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = timestamp - start;
                const percent = Math.min((progress / totalTime) * 100, 100);
                fill.style.width = percent + "%";
                val.innerText = Math.floor(percent) + "%";
                if (progress < totalTime) {
                    window.requestAnimationFrame(step);
                } else {
                    setTimeout(() => {
                        loader.classList.add("loader-hidden");
                        content.classList.add("show");
                    }, 200);
                }
            }
            window.requestAnimationFrame(step);
        });
    </script>
</body>
</html>
