<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORICHIIN</title>

    <style>
        /* FONTS */
        @font-face {
            font-family: 'Lato';
            src: url(https://img1.wsimg.com/gfonts/s/lato/v25/S6uyw4BMUTPHjx4wXg.woff2) format('woff2');
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Lato', sans-serif;
            color: #FFFFFF !important;
            background: url(https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg) no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        :root {
            --yt-bg: rgba(15, 15, 15, 0.85);
            --yt-border: rgba(255, 255, 255, 0.1);
        }

        .yt-header {
            position: fixed;
            top: 0; width: 100%; height: 56px;
            background: var(--yt-bg);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 1000;
            box-sizing: border-box;
        }

        .header-left, .header-right { display: flex; align-items: center; gap: 15px; }

        .icon-btn {
            background: transparent; border: none; cursor: pointer;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }
        .icon-btn svg { width: 24px; height: 24px; fill: white; }

        .header-center { flex: 0 1 720px; margin: 0 15px; }
        .search-container {
            display: flex; background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--yt-border); border-radius: 40px;
            overflow: hidden; padding-left: 20px;
        }
        .search-input {
            flex: 1; background: transparent; border: none;
            color: white; outline: none; font-size: 14px; height: 40px;
        }
        .search-btn {
            background: rgba(255,255,255,0.1); border: none;
            width: 64px; height: 40px; border-left: 1px solid var(--yt-border);
            cursor: pointer;
        }

        .user-avatar {
            width: 32px; height: 32px; background: #99CCFF;
            border-radius: 50%; color: #000; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
        }

        /* --- SIDEBAR CẢI TIẾN --- */
        .yt-sidebar {
            position: fixed; left: 0; top: 56px; width: 240px; height: calc(100% - 56px);
            background: var(--yt-bg); backdrop-filter: blur(10px);
            padding: 12px; z-index: 999; box-sizing: border-box;
            border-right: 1px solid var(--yt-border);
            transition: width 0.3s ease;
            overflow-x: hidden;
        }

        .yt-sidebar.closed {
            width: 72px;
        }

        .sidebar-item {
            padding: 10px; border-radius: 10px; cursor: pointer;
            font-size: 14px; transition: 0.2s; margin-bottom: 2px;
            display: flex; align-items: center;
            white-space: nowrap;
            color: white; /* Đảm bảo màu chữ luôn trắng */
        }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255,255,255,0.1); }
        
        .sidebar-item svg {
            min-width: 24px; width: 24px; height: 24px; 
            margin-right: 24px; fill: white;
        }

        .yt-sidebar.closed .item-text {
            display: none;
        }

        /* --- LOADING SCREEN --- */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c8b8f; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-top-img { width: 360px; height: auto; margin-bottom: 20px; }
        .neon-loading-container { width: 320px; margin: 10px 0; font-family: sans-serif; }
        .neon-text-row { display: flex; justify-content: space-between; color: #00FF00; font-weight: bold; font-size: 18px; text-shadow: 0 0 10px #00FF00; margin-bottom: 8px; }
        .neon-bar-border { width: 100%; height: 22px; border: 2px solid #00FF00; border-radius: 15px; padding: 2px; box-sizing: border-box; box-shadow: 0 0 5px #00FF00; }
        .neon-bar-fill { height: 100%; width: 0%; background: #00FF00; border-radius: 10px; box-shadow: 0 0 15px #00FF00; }
        .loader-hidden { opacity: 0; visibility: hidden; }

        /* --- CONTAINER --- */
        .container {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.2); opacity: 0; 
            transition: opacity 1s ease-in, padding-left 0.3s ease;
            padding-left: 240px; 
        }
        .container.full-width { padding-left: 72px !important; }
        .container.show { opacity: 1; }
        .content-box { max-width: 600px; padding: 40px; border-radius: 25px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin: 20px; }
        h1 { color: #d9b8ab; margin-top: 0; font-size: 2.5em; text-shadow: 0 0.05em rgba(0,0,0,.8) !important; }
        p { line-height: 1.6; font-size: 1.1em; text-shadow: 0 0.05em rgba(0,0,0,.8) !important; }
        a { color: #99CCFF; text-decoration: none; font-weight: bold; transition: 0.3s; }
        a:hover { color: #ffffff; text-decoration: underline; }

        /* Style để link trong sidebar không bị đổi màu hay gạch chân */
        .sidebar-link {
            text-decoration: none !important;
            color: inherit !important;
            display: block;
        }
    </style>
</head>
<body>

            </button>
            <div class="user-avatar">O</div>

    <script>
        document.getElementById("menu-toggle").addEventListener("click", function() {
            const sidebar = document.getElementById("sidebar");
            const mainContent = document.getElementById("main-content");
            sidebar.classList.toggle("closed");
            mainContent.classList.toggle("full-width");
        });

        window.addEventListener("load", function() {
            const loader = document.getElementById("loader-wrapper");
            const content = document.getElementById("main-content");
            const fill = document.getElementById("load-fill");
            const val = document.getElementById("load-val");
            const totalTime = 5000; 

            let start = null;
            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = timestamp - start;
                const percent = Math.min((progress / totalTime) * 100, 100);
                fill.style.width = percent + "%";
                val.innerText = Math.floor(percent) + "%";
                if (progress < totalTime) {
                    window.requestAnimationFrame(step);
                } else {
                    setTimeout(() => {
                        loader.classList.add("loader-hidden");
                        content.classList.add("show");
                    }, 200);
                }
            }
            window.requestAnimationFrame(step);
        });
    </script>
