<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORICHIIN - KHTN KHỐI 9</title>

    <style>
        @font-face {
            font-family: 'Lato';
            src: url(https://img1.wsimg.com/gfonts/s/lato/v25/S6uyw4BMUTPHjx4wXg.woff2) format('woff2');
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Lato', sans-serif;
            background-color: #000;
        }

        /* NỀN GURA */
        .bg-fallback {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url(https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg) no-repeat center center fixed;
            background-size: cover;
            z-index: -101;
        }

        /* VIDEO NỀN */
        #video-bg {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -100;
            object-fit: cover;
            transition: opacity 1s;
        }

        .video-off #video-bg { opacity: 0; visibility: hidden; }

        /* NÚT MẶT TRỜI / MẶT TRĂNG */
        .toggle-container { position: fixed; top: 25px; right: 25px; z-index: 1000; }
        #theme-toggle {
            width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; transition: 0.5s;
            background: #ffce54; box-shadow: 0 0 15px #ffce54;
        }
        .video-off #theme-toggle {
            background: #5d9cec; box-shadow: 0 0 15px #5d9cec; transform: rotate(360deg);
        }

        /* NỘI DUNG */
        .container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .content-box {
            max-width: 600px; padding: 40px; border-radius: 25px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        h1 { color: #d9b8ab; }
        a { color: #99CCFF; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body onclick="forcePlay()"> <div class="bg-fallback"></div>

    <video autoplay muted loop playsinline id="video-bg">
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div class="toggle-container">
        <button id="theme-toggle" onclick="event.stopPropagation(); toggleTheme()">
            <span id="icon">☀️</span>
        </button>
    </div>

    <div class="container">
        <div class="content-box">
            <h1>ORICHIIN STUDIO</h1>
            <p>Trang web đang trong quá trình phát triển - hiện chưa truy cập được vui lòng quay lại sau nhé!!!</p>
            <p>Dự án chính: <a href="https://hentaiorc.xyz">ORC-STUDIO</a></p>
            <p>Youtube: <a href="https://www.youtube.com/@ORIICHIN" target="_blank">@ORIICHIN</a></p>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-bg');

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('icon');
            if (body.classList.contains('video-off')) {
                body.classList.remove('video-off');
                video.play();
                icon.innerHTML = "☀️";
            } else {
                body.classList.add('video-off');
                video.pause();
                icon.innerHTML = "🌙";
            }
        }

        function forcePlay() {
            if (!document.body.classList.contains('video-off')) {
                video.play();
            }
        }

        // Tự động thử lại khi trang load xong
        window.addEventListener('load', () => {
            video.play().catch(() => {
                console.log("Cần click để phát video");
            });
        });
    </script>
</body>
</html>
