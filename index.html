<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="ORC.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORICHIIN</title>

    <style>
        /* FONTS */
        @font-face {
            font-family: 'Lato';
            src: url(https://img1.wsimg.com/gfonts/s/lato/v25/S6uyw4BMUTPHjx4wXg.woff2) format('woff2');
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Lato', sans-serif;
            color: #FFFFFF !important;
            /* THIẾT LẬP NỀN ẢNH GURA */
            background: url(https://r4.wallpaperflare.com/wallpaper/118/736/916/gawr-gura-hololive-blue-eyes-white-hair-hd-wallpaper-6631b6686024bc6e11599a9da016af34.jpg) no-repeat center center fixed;
            background-size: cover;
            overflow: hidden; /* Tránh thanh cuộn */
        }

        /* LỚP PHỦ MỜ ĐỂ CHỮ NỔI BẬT HƠN */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2); /* Làm tối nền một chút */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* KHUNG NỘI DUNG */
        .content-box {
            max-width: 600px;
            padding: 40px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.75); /* Nền hộp đen mờ */
            backdrop-filter: blur(15px); /* Hiệu ứng kính mờ xịn xò */
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin: 20px;
        }

        h1 {
            color: #d9b8ab;
            margin-top: 0;
            font-size: 2.5em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.1em;
            line-height: 1.6;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* ĐƯỜNG LINK */
        a {
            color: #99CCFF;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="content-box">
            <h1>ORICHIIN STUDIO</h1>
            <p>Trang web đang trong quá trình phát triển - hiện chưa truy cập được vui lòng quay lại sau nhé!!!</p>
            <p>Dự án chính: <a href="https://hentaiorc.xyz">ORC-STUDIO</a></p>
            <p>Youtube: <a href="https://www.youtube.com/@ORIICHIN" target="_blank">@ORIICHIN</a></p>
        </div>
    </div>

</body>
</html>
